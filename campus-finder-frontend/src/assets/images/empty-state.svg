<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" fill="none">
  <defs>
    <linearGradient id="eBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="100%" style="stop-color:#e8e6dc"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="120" cy="100" r="80" fill="url(#eBg)"/>
  <!-- Empty box -->
  <rect x="80" y="70" width="80" height="65" rx="8" stroke="#b0aea5" stroke-width="2" stroke-dasharray="4 3" fill="#faf9f5"/>
  <!-- Magnifying glass tilted (nothing found) -->
  <g transform="translate(110, 90) rotate(-30)">
    <circle cx="0" cy="0" r="18" stroke="#b0aea5" stroke-width="2" fill="none"/>
    <line x1="13" y1="13" x2="24" y2="24" stroke="#b0aea5" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Question mark -->
  <text x="120" y="88" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#b0aea5" font-weight="bold">?</text>
</svg>
