<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" fill="none">
  <defs>
    <linearGradient id="bannerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#409EFF"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <radialGradient id="glow1" cx="80%" cy="20%" r="50%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#fff;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="80%" r="40%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#fff;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="260" rx="20" fill="url(#bannerBg)"/>
  <!-- Glow effects -->
  <rect width="800" height="260" rx="20" fill="url(#glow1)"/>
  <rect width="800" height="260" rx="20" fill="url(#glow2)"/>
  <!-- Decorative circles -->
  <circle cx="650" cy="60" r="80" fill="#fff" opacity="0.04"/>
  <circle cx="720" cy="130" r="50" fill="#fff" opacity="0.05"/>
  <circle cx="100" cy="200" r="60" fill="#fff" opacity="0.03"/>
  <!-- Grid dots pattern (subtle) -->
  <g opacity="0.06" fill="#fff">
    <circle cx="400" cy="30" r="1.5"/><circle cx="430" cy="30" r="1.5"/><circle cx="460" cy="30" r="1.5"/><circle cx="490" cy="30" r="1.5"/>
    <circle cx="400" cy="60" r="1.5"/><circle cx="430" cy="60" r="1.5"/><circle cx="460" cy="60" r="1.5"/><circle cx="490" cy="60" r="1.5"/>
    <circle cx="400" cy="90" r="1.5"/><circle cx="430" cy="90" r="1.5"/><circle cx="460" cy="90" r="1.5"/><circle cx="490" cy="90" r="1.5"/>
    <circle cx="400" cy="120" r="1.5"/><circle cx="430" cy="120" r="1.5"/><circle cx="460" cy="120" r="1.5"/><circle cx="490" cy="120" r="1.5"/>
    <circle cx="400" cy="150" r="1.5"/><circle cx="430" cy="150" r="1.5"/><circle cx="460" cy="150" r="1.5"/><circle cx="490" cy="150" r="1.5"/>
    <circle cx="400" cy="180" r="1.5"/><circle cx="430" cy="180" r="1.5"/><circle cx="460" cy="180" r="1.5"/><circle cx="490" cy="180" r="1.5"/>
    <circle cx="400" cy="210" r="1.5"/><circle cx="430" cy="210" r="1.5"/><circle cx="460" cy="210" r="1.5"/><circle cx="490" cy="210" r="1.5"/>
  </g>
  <!-- Right side: Large magnifying glass illustration -->
  <g transform="translate(610, 60)" opacity="0.15">
    <circle cx="50" cy="50" r="55" stroke="#fff" stroke-width="6" fill="none"/>
    <line x1="89" y1="89" x2="130" y2="130" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
