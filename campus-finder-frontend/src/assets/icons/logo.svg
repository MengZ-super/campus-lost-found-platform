<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#409EFF"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#e8e6dc;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#409EFF" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect x="8" y="8" width="104" height="104" rx="26" fill="url(#logoGrad)" filter="url(#shadow)"/>
  <!-- Magnifying glass circle -->
  <circle cx="52" cy="52" r="26" stroke="url(#innerGrad)" stroke-width="5.5" fill="none"/>
  <!-- Magnifying glass handle -->
  <line x1="70.5" y1="70.5" x2="92" y2="92" stroke="url(#innerGrad)" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Pin inside magnifying glass (represents "found item" location marker) -->
  <g transform="translate(52, 46)">
    <path d="M0-14C7.18-14 13-8.18 13-1c0 9.5-13 18-13 18S-13 8.5-13-1c0-7.18 5.82-13 13-13z" fill="#fff" opacity="0.9"/>
    <circle cx="0" cy="-2" r="5" fill="url(#logoGrad)"/>
  </g>
</svg>
