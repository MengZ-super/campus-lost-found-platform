server:
  port: 8080
  servlet:
    context-path: /

spring:
  # 数据源配置（通过1Panel Docker容器管理）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/campus_finder?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:mysql_jeZ4zX}

  # Redis 配置（通过1Panel Docker容器管理）
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: redis_myijP2
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: 1000ms

# JWT 配置
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production-environment}
  access-token-expiration: 900000       # 15分钟（毫秒）
  refresh-token-expiration: 604800000   # 7天（毫秒）

# 文件上传配置
file:
  upload:
    path: ./uploads
    avatar:
      max-size: 2MB
      allowed-types: image/jpeg,image/png,image/gif

# MinIO 配置
minio:
  endpoint: http://localhost:9000
  access-key: minio_bhFH5e
  secret-key: minio_Fmnjpw
  bucket: campus-finder
